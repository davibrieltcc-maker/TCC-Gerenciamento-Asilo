{% extends 'base.html' %}
{% block title %}Desligar Funcionário{% endblock %}{% block page_title %}Desligar Funcionário{% endblock %}
{% block content %}<div class="row justify-content-center"><div class="col-md-5"><div class="form-card text-center">
<i class="bi bi-person-x-fill text-warning" style="font-size:3rem;"></i>
<h5 class="mt-3">Desligar {{ funcionario.usuario.get_full_name }}?</h5>
<p class="text-muted">A data de demissão será registrada como hoje.</p>
<form method="post">{% csrf_token %}
<div class="d-flex gap-2 justify-content-center">
<button type="submit" class="btn btn-warning">Sim, desligar</button>
<a href="{% url 'funcionarios:lista' %}" class="btn btn-outline-secondary">Cancelar</a>
</div></form></div></div></div>{% endblock %}
