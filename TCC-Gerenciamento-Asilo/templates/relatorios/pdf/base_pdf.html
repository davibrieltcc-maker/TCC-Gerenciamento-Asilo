<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; font-size: 11px; color: #1B2A1E; margin: 0; padding: 20px; }
    h1 { font-size: 16px; color: #2E7D32; border-bottom: 2px solid #2E7D32; padding-bottom: 6px; margin-bottom: 16px; }
    h2 { font-size: 13px; color: #2E7D32; margin: 12px 0 6px; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .header-title h1 { margin: 0; border: none; font-size: 20px; }
    .header-title small { color: #6B7280; font-size: 10px; }
    .header-meta { text-align: right; font-size: 10px; color: #6B7280; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 10px; }
    th { background: #2E7D32; color: #fff; padding: 5px 8px; text-align: left; font-size: 10px; }
    td { padding: 5px 8px; border-bottom: 1px solid #E8EAF0; }
    tr:nth-child(even) td { background: #F9FAFB; }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; }
    .badge-ok { background: #E8F5E9; color: #2E7D32; }
    .badge-warn { background: #FFF3E0; color: #E65100; }
    .badge-danger { background: #FFEBEE; color: #C62828; }
    .badge-info { background: #E3F2FD; color: #1565C0; }
    .footer { text-align: center; font-size: 9px; color: #9CA3AF; border-top: 1px solid #E8EAF0; margin-top: 20px; padding-top: 8px; }
  </style>
</head>
<body>
<div class="header">
  <div class="header-title">
    <h1>&#9829; AsiloGest</h1>
    <small>Sistema de Gerenciamento de Asilo</small>
  </div>
  <div class="header-meta">
    Emitido em: {{ hoje|date:"d/m/Y" }}<br>
    {% block meta %}{% endblock %}
  </div>
</div>
{% block content %}{% endblock %}
<div class="footer">AsiloGest – Sistema de Gerenciamento de Asilo &copy; {{ hoje|date:"Y" }}</div>
</body>
</html>
