{% extends 'base.html' %}
{% block title %}Excluir Rotina{% endblock %}{% block page_title %}Excluir Rotina{% endblock %}
{% block content %}<div class="row justify-content-center"><div class="col-md-5"><div class="form-card text-center">
<i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem;"></i>
<h5 class="mt-3">Excluir rotina de {{ rotina.idoso.nome }}?</h5>
<p class="text-muted">{{ rotina.data|date:"d/m/Y" }} – {{ rotina.get_turno_display }}</p>
<form method="post">{% csrf_token %}
<div class="d-flex gap-2 justify-content-center">
<button type="submit" class="btn btn-danger">Sim, excluir</button>
<a href="{% url 'atividades:lista' %}" class="btn btn-outline-secondary">Cancelar</a>
</div></form></div></div></div>{% endblock %}
