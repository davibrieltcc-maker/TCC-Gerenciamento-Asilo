{% extends 'base.html' %}
{% block title %}Desativar Medicamento{% endblock %}{% block page_title %}Desativar Medicamento{% endblock %}
{% block content %}<div class="row justify-content-center"><div class="col-md-5"><div class="form-card text-center">
<i class="bi bi-exclamation-triangle-fill text-warning" style="font-size:3rem;"></i>
<h5 class="mt-3">Desativar {{ medicamento.nome }}?</h5>
<p class="text-muted">O medicamento será desativado mas o histórico será mantido.</p>
<form method="post">{% csrf_token %}
<div class="d-flex gap-2 justify-content-center">
<button type="submit" class="btn btn-warning">Sim, desativar</button>
<a href="{% url 'medicamentos:lista' %}" class="btn btn-outline-secondary">Cancelar</a>
</div></form></div></div></div>{% endblock %}
